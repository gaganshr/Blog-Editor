<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Studio — DEFINE / Tiny Oak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --c-primary:#6B3FE5; --c-primary-deep:#5827C7; --c-cyan:#5BE3FF;
      --c-ink:#1A1B3A; --c-ink-muted:#5B5C70; --c-rule:#E5E5EF; --c-card:#F7F7FB;
      --ff-display:'Barlow Condensed',sans-serif; --ff-body:'Roboto',system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--ff-body);color:var(--c-ink);background:#fff;}
    .wrap{max-width:1040px;margin:0 auto;padding:0 24px;}
    header.top{border-bottom:1px solid var(--c-rule);}
    .top .wrap{display:flex;align-items:center;gap:14px;padding:18px 24px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--c-ink);}
    .logo__mark{width:34px;height:34px;border-radius:9px;background:var(--c-ink);color:#fff;display:grid;place-items:center;font-family:var(--ff-display);font-weight:700;font-size:18px;}
    .logo__name{font-family:var(--ff-display);font-weight:700;font-size:20px;letter-spacing:.5px;}
    .logo__tag{font-size:11px;color:var(--c-ink-muted);letter-spacing:2px;text-transform:uppercase;}
    .spacer{flex:1}
    .btn{font:inherit;font-weight:600;border-radius:9px;padding:11px 18px;cursor:pointer;border:1.5px solid transparent;text-decoration:none;display:inline-flex;align-items:center;gap:8px;line-height:1;}
    .btn--primary{background:var(--c-primary);color:#fff;}
    .btn--primary:hover{background:var(--c-primary-deep);}
    .btn--ghost{background:#fff;color:var(--c-primary);border-color:var(--c-primary);}
    .btn--sm{padding:7px 12px;font-size:13px;border-radius:7px;}
    .btn--danger{color:#C0392B;border-color:#E7B7B1;background:#fff;}
    .btn--danger:hover{background:#FCEBE9;}
    .hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:40px 0 24px;flex-wrap:wrap;}
    h1{font-family:var(--ff-display);font-weight:700;font-size:40px;letter-spacing:-.5px;margin:0;}
    .sub{color:var(--c-ink-muted);font-size:14px;margin-top:6px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding-bottom:60px;}
    .card{border:1px solid var(--c-rule);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .15s,border-color .15s;background:#fff;}
    .card:hover{box-shadow:0 10px 30px rgba(26,27,58,.08);border-color:#d7d7e6;}
    .card__title{font-family:var(--ff-display);font-weight:600;font-size:22px;line-height:1.15;color:var(--c-ink);word-break:break-word;}
    .card__meta{font-size:12px;color:var(--c-ink-muted);}
    .card__actions{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap;}
    .empty,.state{border:1.5px dashed var(--c-rule);border-radius:14px;padding:48px 24px;text-align:center;color:var(--c-ink-muted);}
    .empty h2{font-family:var(--ff-display);color:var(--c-ink);font-size:24px;margin:0 0 8px;}
    .banner{background:#FCE9DE;border:1px solid #F1C7B0;color:#7a3b16;border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.5;margin:16px 0;}
    .banner code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--c-ink);color:#fff;padding:10px 18px;border-radius:9px;font-size:14px;opacity:0;pointer-events:none;transition:.2s;z-index:50;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .spin{width:18px;height:18px;border:2px solid rgba(107,63,229,.25);border-top-color:var(--c-primary);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header class="top">
    <div class="wrap">
      <a class="logo" href="./">
        <span class="logo__mark">D</span>
        <span><span class="logo__name">EFINE</span> <span class="logo__tag">Blog Studio</span></span>
      </a>
      <span class="spacer"></span>
      <button class="btn btn--primary" id="newBlog">+ New blog</button>
    </div>
  </header>

  <main class="wrap">
    <div class="hero-row">
      <div>
        <h1>Your blogs</h1>
        <div class="sub" id="count">Loading…</div>
      </div>
    </div>
    <div id="list"><div class="state"><span class="spin"></span> &nbsp;Loading your blogs…</div></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    var listEl = document.getElementById('list');
    var countEl = document.getElementById('count');
    var toastEl = document.getElementById('toast');
    var toastTimer;
    function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){toastEl.classList.remove('show');},2200); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function fmt(iso){ if(!iso) return 'just now'; try{ var d=new Date(iso); return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});}catch(e){return iso;} }

    function configBanner(){
      return '<div class="banner"><strong>Storage not connected yet.</strong> The blog library needs a Cloudflare KV namespace bound as <code>BLOGS</code>. Once that’s set up, your blogs will appear here. (See the setup steps you were given.)</div>';
    }

    function render(blogs){
      countEl.textContent = blogs.length ? (blogs.length + (blogs.length===1?' blog':' blogs')) : 'No blogs yet';
      if(!blogs.length){
        listEl.innerHTML = '<div class="empty"><h2>No blogs yet</h2><div>Click <strong>+ New blog</strong> to start your first one.</div></div>';
        return;
      }
      listEl.className='grid';
      listEl.innerHTML = blogs.map(function(b){
        return '<div class="card" data-id="'+esc(b.id)+'">'
          + '<div class="card__title">'+esc(b.title||'Untitled blog')+'</div>'
          + '<div class="card__meta">Updated '+esc(fmt(b.updatedAt))+'</div>'
          + '<div class="card__actions">'
            + '<a class="btn btn--primary btn--sm" href="editor.html?id='+encodeURIComponent(b.id)+'">Open</a>'
            + '<button class="btn btn--ghost btn--sm" data-act="rename">Rename</button>'
            + '<button class="btn btn--danger btn--sm" data-act="delete">Delete</button>'
          + '</div></div>';
      }).join('');
    }

    function load(){
      listEl.className='';
      listEl.innerHTML='<div class="state"><span class="spin"></span> &nbsp;Loading your blogs…</div>';
      fetch('/api/blogs',{headers:{'accept':'application/json'}})
        .then(function(r){ if(!r.ok) return r.json().then(function(j){throw new Error(j.error||('HTTP '+r.status));}); return r.json(); })
        .then(function(data){ render(data.blogs||[]); })
        .catch(function(err){
          countEl.textContent='Not connected';
          listEl.className='';
          listEl.innerHTML = configBanner() + '<div class="empty"><h2>Couldn’t load blogs</h2><div>'+esc(err.message)+'</div></div>';
        });
    }

    document.getElementById('newBlog').addEventListener('click', function(){
      var btn=this; btn.disabled=true; btn.textContent='Creating…';
      fetch('/api/blogs',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({title:'Untitled blog'})})
        .then(function(r){ if(!r.ok) return r.json().then(function(j){throw new Error(j.error||('HTTP '+r.status));}); return r.json(); })
        .then(function(data){ window.location.href='editor.html?id='+encodeURIComponent(data.id)+'&new=1'; })
        .catch(function(err){ btn.disabled=false; btn.textContent='+ New blog'; toast('Could not create: '+err.message); });
    });

    listEl.addEventListener('click', function(e){
      var btn=e.target.closest('button[data-act]'); if(!btn) return;
      var card=e.target.closest('.card'); var id=card.getAttribute('data-id');
      var act=btn.getAttribute('data-act');
      var title=card.querySelector('.card__title').textContent;
      if(act==='delete'){
        if(!confirm('Delete “'+title+'”? This cannot be undone.')) return;
        fetch('/api/blogs/'+encodeURIComponent(id),{method:'DELETE'})
          .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); toast('Deleted'); load(); })
          .catch(function(err){ toast('Delete failed: '+err.message); });
      } else if(act==='rename'){
        var name=prompt('Rename blog', title); if(name==null) return;
        fetch('/api/blogs/'+encodeURIComponent(id),{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({title:name})})
          .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); toast('Renamed'); load(); })
          .catch(function(err){ toast('Rename failed: '+err.message); });
      }
    });

    load();
  </script>
</body>
</html>
